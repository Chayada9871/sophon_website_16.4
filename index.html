<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sophon Market | Sophon Supermarket</title>
  <meta
    name="description"
    content="Sophon Market ซูเปอร์มาร์เก็ตสำหรับทุกวัน พร้อมสินค้าอุปโภคบริโภค อาหารสด และโปรโมชั่นประจำสัปดาห์"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="utility-bar">
        <div class="container utility-inner">
          <div class="utility-left">
            <span>ติดตามเราได้ที่</span>
            <div class="social-links">
              <a href="contact.html" aria-label="Facebook" class="social-icon-image">
                <img src="assets/fb-icon.png" alt="Facebook">
              </a>
              <a href="contact.html" aria-label="Line" class="social-icon-image">
                <img src="assets/line-icon.png" alt="Line">
              </a>
            </div>
          </div>
          <div class="utility-right">
            <span class="phone-icon social-icon-image">
              <img src="assets/tel-icon.png" alt="Telephone">
            </span>
            <span class="utility-phone">065 262 6861</span>
            <a href="#" class="lang-pill social-icon-image" aria-label="English" data-lang="en">
              <img src="assets/en-icon.png" alt="English">
            </a>
            <a href="#" class="lang-pill social-icon-image" aria-label="Thai" data-lang="th">
              <img src="assets/th-icon.png" alt="Thai">
            </a>
          </div>
        </div>
      </div>

      <div class="main-nav-wrap">
        <div class="container nav-row">
          <button class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="เปิดเมนู">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
            <a href="index.html" class="is-active">หน้าแรก</a>
            <a href="products.html">สินค้าและร้านค้า</a>
            <a href="promotions.html">ข่าวสารและโปรโมชั่น</a>
            <a href="shopping.html">ช้อปปิ้งออนไลน์</a>
            <a href="contact.html">ติดต่อเรา</a>
          </nav>
        </div>
      </div>
    </header>

    <main id="top">
      <section class="hero">
        <div class="hero-stage">
          <img src="assets/sp-1.png" alt="หน้าร้าน Sophon Supermarket" class="hero-bg">
        </div>
      </section>

      <section id="brochure" class="brochure-bar">
        <div class="brochure-bar-inner reveal">
          <div class="brochure-preview">
            <img src="assets/sp-2.png" alt="โบรชัวร์ออนไลน์ Sophon Market" class="brochure-image">
            <a href="brochure.html" class="brochure-button">โบรชัวร์ออนไลน์ &gt;</a>
          </div>
        </div>
      </section>

      <section id="about" class="about-section">
        <div class="about-box reveal">
          <div class="about-gallery about-gallery-single">
            <img src="assets/sp-3.png" alt="ภาพโปรโมชั่น Sophon Supermarket">
          </div>
        </div>
      </section>

      <section class="location-section">
        <div class="location-grid reveal">
          <div class="map-panel">
            <div class="map-card-overlay">
              <strong>Sophon Supermarket</strong>
              <p>(โสภณซุปเปอร์)</p>
              <p>499/9 หมู่ 6 ตำบลพลูตาหลวง อำเภอสัตหีบ จังหวัดชลบุรี 20150, Thailand</p>
              <p class="map-rating">4.2 ★ (42)</p>
              <a href="https://maps.app.goo.gl/sRpQ1VrNCvYdVP1U9" class="map-open-link" target="_blank" rel="noreferrer">เปิดใน Google Maps</a>
            </div>
            <iframe
              class="map-embed"
              src="https://www.google.com/maps?q=https://maps.app.goo.gl/sRpQ1VrNCvYdVP1U9&output=embed"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              title="แผนที่ Sophon Supermarket"
            ></iframe>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer-panel">
      <div class="container footer-grid">
        <div class="footer-brand-block">
          <img src="assets/sophon-logo.png" alt="Sophon Market" class="footer-logo">
        </div>
        <div class="footer-contact-block"></div>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
